<section class="flex flex-col gap-4 p-6 min-h-dvh">
  <sch-modal-header [title]="modalTitle" (close)="closeModal()" />
  <form
    [formGroup]="form"
    (submit)="save()"
    class="flex flex-col gap-6 justify-between"
  >
    <div class="grid grid-cols-[100px_1fr] gap-x-3 gap-y-3 items-center">
      <label hlmLabel for="title">Title</label>
      <input
        #title
        hlmInput
        id="title"
        type="text"
        formControlName="title"
      />

      <label hlmLabel for="start">Start</label>
      <input
        hlmInput
        id="start"
        type="text"
        mwlFlatpickr
        formControlName="start"
        [enableTime]="true"
        dateFormat="H:i"
        placeholder="Not set"
        [noCalendar]="true"
        [time24hr]="true"
        [minuteIncrement]="60 / segmentsPerHour"
      />

      <label hlmLabel for="end">End</label>
      <input
        hlmInput
        id="end"
        type="text"
        mwlFlatpickr
        formControlName="end"
        [enableTime]="true"
        dateFormat="H:i"
        [minuteIncrement]="60 / segmentsPerHour"
        placeholder="Not set"
        [noCalendar]="true"
        [time24hr]="true"
      />

      <label hlmLabel for="participants" class="self-start pt-2.5">Participants</label>
      <ng-select
        id="participants"
        [items]="participantsWithConflictInfo"
        [multiple]="true"
        [closeOnSelect]="false"
        bindLabel="name"
        bindValue="name"
        placeholder="Select or create participants"
        formControlName="participants"
        [searchable]="true"
        dropdownPosition="bottom"
        [hideSelected]="true"
        [addTag]="true"
        [clearSearchOnAdd]="true"
      >
        <ng-template ng-option-tmp let-item="item" let-search="searchTerm">
          <div
            [class.text-destructive]="item.isConflicted"
            [class.font-semibold]="item.isConflicted"
          >
            {{ item.isConflicted ? "⚠️ " : "" }}{{ item.name }}
          </div>
        </ng-template>
        <ng-template ng-label-tmp let-item="item" let-clear="clear">
          <span
            class="ng-value-label"
            [class.text-destructive]="isParticipantConflicted(getParticipantName(item))"
            [class.font-semibold]="isParticipantConflicted(getParticipantName(item))"
          >
            {{ isParticipantConflicted(getParticipantName(item)) ? "⚠️ " : ""
            }}{{ getParticipantName(item) }}
          </span>
          <button class="ng-value-icon right" (click)="clear(item)">×</button>
        </ng-template>
      </ng-select>
    </div>

    @if (!readOnly) {
    <footer class="flex flex-row gap-2 items-center justify-end">
      @if (modalData.type==='edit') {
      <button
        hlmBtn
        variant="destructive"
        type="button"
        class="mr-auto"
        (click)="deleteTask(modalData.task.id)"
        data-umami-event="delete-task"
      >
        Delete
      </button>
      }
      <button
        hlmBtn
        type="submit"
        [disabled]="!form.valid"
        data-umami-event="save-task"
      >
        Save
      </button>
    </footer>
    }
  </form>
</section>
