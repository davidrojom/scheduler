<ng-container *ngIf="canShare$ | async">
  <button
    hlmBtn
    variant="outline"
    type="button"
    (click)="open(shareModal)"
    title="Share / Invite"
    aria-label="Share / Invite"
    data-umami-event="open-share-invite"
  >
    <i class="ph ph-user-plus text-lg"></i>
    <span class="hidden md:block">Invite</span>
  </button>
</ng-container>

<ng-template #shareModal let-modal>
  <div class="flex items-center justify-between gap-4 border-b border-border px-6 py-4">
    <h4 class="text-lg font-semibold tracking-tight" id="share-invite-modal">Share / Invite</h4>
    <button
      type="button"
      class="grid h-8 w-8 -mr-2 place-content-center rounded-md text-muted-foreground hover:bg-accent hover:text-accent-foreground transition-colors"
      aria-label="Close"
      (click)="modal.dismiss()"
    >
      <i class="ph ph-x text-lg"></i>
    </button>
  </div>
  <div class="px-6 py-5 flex flex-col gap-4">
    <div class="flex flex-col gap-2">
      <label hlmLabel for="invite-role-select">Role</label>
      <select
        hlmInput
        id="invite-role-select"
        [(ngModel)]="role"
        aria-label="Invite role"
        data-umami-event="select-invite-role"
      >
        <option *ngFor="let option of roles" [value]="option">
          {{ option | titlecase }}
        </option>
      </select>
    </div>

    <button
      hlmBtn
      type="button"
      [disabled]="generating"
      (click)="generate()"
      data-umami-event="generate-invite-link"
    >
      <i class="ph ph-link text-lg"></i>
      <span>{{ generating ? 'Generating...' : 'Generate link' }}</span>
    </button>

    <div *ngIf="inviteUrl as url" class="flex flex-col gap-2">
      <input
        hlmInput
        type="text"
        [value]="url"
        readonly
        aria-label="Invite link"
        data-invite-url
      />
      <button
        hlmBtn
        variant="secondary"
        type="button"
        (click)="copy()"
        data-umami-event="copy-invite-link"
      >
        <i class="ph ph-copy-simple text-lg"></i>
        <span>{{ copied ? 'Copied!' : 'Copy link' }}</span>
      </button>
    </div>

    <p *ngIf="errorMessage" class="text-sm text-destructive">{{ errorMessage }}</p>
  </div>
  <div class="flex items-center justify-end gap-2 border-t border-border px-6 py-4">
    <button hlmBtn variant="outline" type="button" (click)="modal.dismiss()">
      Close
    </button>
  </div>
</ng-template>
