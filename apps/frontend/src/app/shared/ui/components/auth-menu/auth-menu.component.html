<ng-container *ngIf="currentUser$ | async as user; else signInTpl">
  <div class="relative">
    <button
      type="button"
      (click)="toggleMenu()"
      class="flex items-center gap-2 pl-2 pr-3 py-1.5 rounded-full hover:bg-gray-700 transition-all cursor-pointer text-white"
      title="Account menu"
      data-umami-event="open-user-menu"
    >
      <img
        *ngIf="user.avatarUrl"
        [src]="user.avatarUrl"
        alt=""
        class="w-8 h-8 rounded-full object-cover"
      />
      <span
        *ngIf="!user.avatarUrl"
        class="w-8 h-8 rounded-full bg-blue-600 grid place-items-center font-bold uppercase"
      >
        {{ initial(user) }}
      </span>
      <span class="hidden md:block max-w-[160px] truncate">{{
        user.name || user.email
      }}</span>
      <i class="ph ph-caret-down"></i>
    </button>

    <div
      *ngIf="menuOpen"
      class="absolute right-0 mt-2 w-56 bg-white rounded-lg shadow-lg z-50 overflow-hidden"
    >
      <div class="px-4 py-3 border-b">
        <p class="font-semibold text-gray-900 truncate">
          {{ user.name || 'Account' }}
        </p>
        <p class="text-sm text-gray-500 truncate">{{ user.email }}</p>
      </div>
      <button
        type="button"
        (click)="logout()"
        class="w-full flex items-center gap-2 px-4 py-3 text-left text-gray-700 hover:bg-gray-100 transition-all cursor-pointer"
        data-umami-event="logout"
      >
        <i class="ph ph-sign-out text-lg"></i>
        <span>Logout</span>
      </button>
    </div>

    <button
      *ngIf="menuOpen"
      type="button"
      (click)="closeMenu()"
      aria-label="Close account menu"
      class="fixed inset-0 z-40 cursor-default"
    ></button>
  </div>
</ng-container>

<ng-template #signInTpl>
  <button
    type="button"
    (click)="login()"
    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-white hover:bg-gray-100 transition-all cursor-pointer shadow-sm text-gray-800 font-medium"
    data-umami-event="sign-in-google"
  >
    <i class="ph ph-google-logo text-xl"></i>
    <span class="hidden sm:block">Sign in with Google</span>
    <span class="sm:hidden">Sign in</span>
  </button>
</ng-template>
