<header class="flex flex-row items-center justify-between gap-4">
  <h2 class="text-lg font-semibold tracking-tight text-foreground">{{ title() }}</h2>
  <button
    hlmBtn
    variant="ghost"
    size="icon"
    class="-mr-2 h-8 w-8 shrink-0 text-muted-foreground"
    (click)="close.emit()"
    aria-label="Close"
    data-umami-event="close-modal"
  >
    <i class="ph ph-x text-lg"></i>
  </button>
</header>
