<div class="relative">
  <button
    hlmBtn
    variant="outline"
    type="button"
    class="max-w-[200px] gap-2"
    (click)="toggleDropdown()"
    data-umami-event="toggle-project-dropdown"
  >
    <i class="ph ph-squares-four text-base shrink-0"></i>
    <span class="truncate">{{ (currentProject$ | async)?.name || 'Boards' }}</span>
    <i class="ph ph-caret-down text-sm opacity-70 shrink-0"></i>
  </button>

  @if (showDropdown) {
  <div class="dropdown-menu">
    <div class="px-2 py-1.5 text-xs font-medium text-muted-foreground">
      Switch Project
    </div>
    <div
      *ngFor="let project of projects$ | async as projects"
      class="dropdown-item-wrapper"
    >
      <button
        class="dropdown-item"
        [class.active]="(currentProject$ | async)?.id === project.id"
        (click)="switchProject(project.id)"
        data-umami-event="switch-project"
      >
        <span class="project-name-wrapper">
          <span class="project-name-scroll" schScrollableText>{{
            project.name
          }}</span>
        </span>
        <button
          *ngIf="canDelete(project, projects)"
          class="delete-btn"
          (click)="deleteProject($event, project.id)"
          title="Delete project"
          data-umami-event="delete-project"
        >
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path
              d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"
            />
            <path
              fill-rule="evenodd"
              d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"
            />
          </svg>
        </button>
      </button>
    </div>
    <div class="my-1 h-px bg-border"></div>
    <button
      class="dropdown-item new-project"
      (click)="createNewProject()"
      data-umami-event="create-new-project"
    >
      <i class="ph ph-plus"></i>
      <span>New Project</span>
    </button>
  </div>
  }
</div>

<button
  *ngIf="showDropdown"
  type="button"
  class="dropdown-backdrop"
  aria-label="Close boards menu"
  (click)="showDropdown = false"
></button>
