# nginx config for the Angular SPA (@scheduler/frontend).
# Serves the static build and falls back to index.html for client-side routes
# (e.g. /auth/callback, the Google OAuth redirect target).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Hashed, immutable build assets — cache aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so Angular can route it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
